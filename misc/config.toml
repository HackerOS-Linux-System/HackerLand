# ─────────────────────────────────────────────────────────────────────────────
# HackerLand WM — config.toml
# Location: ~/.config/hackeros/hackerland/config.toml
# Hot-reload: hackerlandwm-msg reload
# ─────────────────────────────────────────────────────────────────────────────

[compositor]
mode       = "tiling"       # tiling | cage | gamescope
workspaces = 9

# ─────────────────────────────────────────────────────────────────────────────
# Theme & Wallpaper
# Supported formats: PNG, JPG/JPEG, SVG, GIF (animated), WebP, BMP
# Special values: "default" = built-in nebula, "animated" = GLSL plasma shader
# ─────────────────────────────────────────────────────────────────────────────
[theme]
wallpaper          = "/usr/share/wallpapers/HackerOS-Wallpapers/Wallpaper24.png"
# wallpaper        = "animated"           # living GLSL nebula (no CPU load)
# wallpaper        = "/home/user/bg.gif"  # animated GIF
# wallpaper        = "/home/user/bg.svg"  # SVG
wallpaper_mode     = "fill"               # fill | fit | center | tile
animated_wallpaper = false                # set true to use GLSL shader

font_family  = "JetBrains Mono"
font_size_ui = 12

border_radius  = 12
border_width   = 1.5
blur_saturation= 1.2

# Accent colours
accent          = "#6C8EBF"
accent_secondary= "#7B68EE"
accent_tertiary = "#48D1CC"

# ─────────────────────────────────────────────────────────────────────────────
# Animations
# ─────────────────────────────────────────────────────────────────────────────
[animations]
enabled     = true
duration_ms = 180
easing      = "OutCubic"   # Linear | OutCubic | OutBack | InOutQuad

# ─────────────────────────────────────────────────────────────────────────────
# Tiling layout
# ─────────────────────────────────────────────────────────────────────────────
[tiling]
layout       = "spiral"   # spiral | tall | wide | grid | bsp | dwindle | monocle
master_ratio = 0.55       # master window width (0.1 – 0.9)
gap_inner    = 10
gap_outer    = 12
smart_gaps   = true       # collapse gaps when only one window

# ─────────────────────────────────────────────────────────────────────────────
# Keybindings
# Modifier: Super | Alt | Ctrl
# Format: "Modifier+Key" = "action"
# ─────────────────────────────────────────────────────────────────────────────
[keybinds]
modifier = "Super"

[keybinds.bindings]
"Super+Return"  = "exec:alacritty"
"Super+D"       = "launcher"
"Super+Q"       = "close"
"Super+F"       = "fullscreen"
"Super+Space"   = "float"
"Super+M"       = "maximize"
"Super+L"       = "lock"
"Super+R"       = "reload"
"Super+Shift+Q" = "quit"

# Focus / move
"Super+H"       = "focus:left"
"Super+J"       = "focus:down"
"Super+K"       = "focus:up"
"Super+L"       = "focus:right"
"Super+Left"    = "focus:left"
"Super+Right"   = "focus:right"
"Super+Up"      = "focus:up"
"Super+Down"    = "focus:down"

# Layouts
"Super+T"       = "layout:spiral"
"Super+G"       = "layout:grid"
"Super+B"       = "layout:bsp"
"Super+W"       = "layout:tall"

# Workspaces 1–9
"Super+1"       = "workspace:1"
"Super+2"       = "workspace:2"
"Super+3"       = "workspace:3"
"Super+4"       = "workspace:4"
"Super+5"       = "workspace:5"
"Super+6"       = "workspace:6"
"Super+7"       = "workspace:7"
"Super+8"       = "workspace:8"
"Super+9"       = "workspace:9"

# Move window to workspace
"Super+Shift+1" = "movetoworkspace:1"
"Super+Shift+2" = "movetoworkspace:2"
"Super+Shift+3" = "movetoworkspace:3"
"Super+Shift+4" = "movetoworkspace:4"
"Super+Shift+5" = "movetoworkspace:5"

# ─────────────────────────────────────────────────────────────────────────────
# Key remapping
# Remap keys before keybind processing (e.g. use CapsLock as Super)
# ─────────────────────────────────────────────────────────────────────────────
[keybinds.remaps]
# "CapsLock" = "Super_L"   # uncomment to use CapsLock as Super
# "Alt_L"    = "Super_L"   # use left Alt as Super

# ─────────────────────────────────────────────────────────────────────────────
# Input device settings
# ─────────────────────────────────────────────────────────────────────────────
[input]
pointer_accel           = 0.3    # -1.0 (slow) to 1.0 (fast)
pointer_speed           = 1.0
natural_scroll          = true   # touchpad scroll direction
tap_to_click            = true   # touchpad tap = click
touchpad_swipe_threshold= 80.0   # px before 3-finger swipe triggers

# ─────────────────────────────────────────────────────────────────────────────
# Window rules — match by app_id or title (glob/wildcard OK)
# Actions: workspace, floating, fullscreen, size (WxH), opacity
# ─────────────────────────────────────────────────────────────────────────────
[[rules]]
app_id    = "firefox"
workspace = 2

[[rules]]
app_id    = "steam"
workspace = 9
floating  = false

[[rules]]
app_id    = "mpv"
floating  = true
size      = "960x540"

[[rules]]
app_id    = "pavucontrol"
floating  = true
size      = "600x400"

[[rules]]
title     = "*Picture-in-Picture*"
floating  = true
size      = "400x225"

# ─────────────────────────────────────────────────────────────────────────────
# Cage mode (single app fullscreen)
# ─────────────────────────────────────────────────────────────────────────────
[cage]
exec          = ""       # command to run
exit_on_close = true
allow_vt      = true

# ─────────────────────────────────────────────────────────────────────────────
# Gamescope mode (upscaling compositor)
# ─────────────────────────────────────────────────────────────────────────────
[gamescope]
exec          = ""
render_w      = 1280
render_h      = 720
output_w      = 1920
output_h      = 1080
fps_limit     = 60
integer_scale = false
fullscreen    = true
filter        = "linear"   # linear | nearest | fsr
exit_on_close = true
